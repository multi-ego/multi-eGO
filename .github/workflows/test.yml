name: 'Multi-eGO test'

on:
  push:
    paths-ignore:
      - 'tools/cmdata/**'
  pull_request:
    paths-ignore:
      - 'tools/cmdata/**'


jobs:
  unit_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/test_multiego.py -v

  build-linux-conda:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Add conda to system path
      uses: conda-incubator/setup-miniconda@v3
      with:
        environment-file: conda/environment.yml
        miniforge-version: latest
        activate-environment: test
    - name: Run flake8 
      run: |
        # Flake8 exit on most issues
        # we use blake to enforce formatting 
        conda install flake8
        $CONDA/bin/flake8 . --count --extend-ignore E501,W605,E731,E402,E711 --show-source --statistics
    - name: Run tests
      shell: bash -el {0}
      run: |
        $CONDA/bin/python tests/run_tests.py
        cd tests; bash run_make_mat.sh; cd ..

  build-linux-pip:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install requirements
      run: pip install -r requirements.txt
    - name: Run tests
      run: |
        python tests/run_tests.py
        cd tests; bash run_make_mat.sh; cd ..

  build-macos-conda:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Add conda to system path
      uses: conda-incubator/setup-miniconda@v3
      with:
        environment-file: conda/environment.yml
        miniforge-version: latest
        activate-environment: test
    - name: Run tests
      shell: bash -el {0}
      run: |
        $CONDA/bin/python tests/run_tests.py
        cd tests; bash run_make_mat.sh; cd ..

  build-macos-pip:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install requirements
      run: pip install -r requirements.txt
    - name: Run tests
      run: |
        python tests/run_tests.py
        cd tests; bash run_make_mat.sh; cd ..
