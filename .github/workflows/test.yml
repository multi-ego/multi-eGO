name: 'Multi-eGO test'

permissions:
  contents: read

on:
  push:
    paths-ignore:
      - 'tools/cmdata/**'
  pull_request:
    paths-ignore:
      - 'tools/cmdata/**'


jobs:
  unit_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
         pytest tests/test_multiego.py -v
         pytest tests/test_apply_symmetries.py -v

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        cache: 'pip'
    - name: Install linters
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run flake8
      run: flake8 .
    - name: Run black (check only)
      run: black --check .

  build-linux-conda:
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - uses: actions/checkout@v6
    - name: Add conda to system path
      uses: conda-incubator/setup-miniconda@v3
      with:
        environment-file: conda/environment.yml
        miniforge-version: latest
        activate-environment: test
    - name: Run tests
      shell: bash -el {0}
      run: |
        pytest tests/run_tests.py
        pytest tests/test_make_mat.py
    - name: Run unit tests
      shell: bash -el {0}
      run: |
        pytest tests/test_multiego.py tests/test_apply_symmetries.py -v

  build-linux-pip:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        cache: 'pip'
    - name: Install requirements
      run: pip install -r requirements.txt
    - name: Run tests
      run: |
        pytest tests/run_tests.py
        pytest tests/test_make_mat.py
    - name: Run unit tests
      run: |
        pytest tests/test_multiego.py tests/test_apply_symmetries.py -v

  build-macos-conda:
    runs-on: macos-14
    needs: lint

    steps:
    - uses: actions/checkout@v6
    - name: Add conda to system path
      uses: conda-incubator/setup-miniconda@v3
      with:
        environment-file: conda/environment.yml
        miniforge-version: latest
        activate-environment: test
    - name: Run tests
      shell: bash -el {0}
      run: |
        pytest tests/run_tests.py
        pytest tests/test_make_mat.py
    - name: Run unit tests
      shell: bash -el {0}
      run: |
        pytest tests/test_multiego.py tests/test_apply_symmetries.py -v

  build-macos-pip:
    runs-on: macos-latest
    needs: lint
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        cache: 'pip'
    - name: Install requirements
      run: pip install -r requirements.txt
    - name: Run tests
      run: |
        pytest tests/run_tests.py
        pytest tests/test_make_mat.py
    - name: Run unit tests
      run: |
        pytest tests/test_multiego.py tests/test_apply_symmetries.py -v
